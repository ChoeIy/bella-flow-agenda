<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Bella Flow • Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #fff5f7 0%, #ffffff 100%);">
  <div class="login-container" style="max-width: 420px; width: 90%; background: white; border-radius: 36px; padding: 40px 32px; box-shadow: 0 20px 40px rgba(233, 186, 193, 0.2); border: 1px solid #ffe4e6; text-align: center;">
    <h1 style="color: #b95c6b; font-size: 2rem; margin-bottom: 8px;"><i class="fas fa-water"></i> Bella Flow</h1>
    <p style="color: #a06b75; margin-bottom: 32px;">Studio de Estética</p>

    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="Sua senha" required>
      </div>
      <button id="loginBtn" class="btn-primary" style="width: 100%; justify-content: center;">Entrar</button>
      <p style="margin-top: 16px;">Não tem conta? <a href="#" id="showRegister" style="color: #b95c6b; font-weight: 500;">Cadastre-se</a></p>
    </div>

    <div id="registerForm" style="display: none;">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="regName" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="regPassword" class="form-control" required>
      </div>
      <button id="registerBtn" class="btn-primary" style="width: 100%; justify-content: center;">Cadastrar</button>
      <p style="margin-top: 16px;">Já tem conta? <a href="#" id="showLogin" style="color: #b95c6b; font-weight: 500;">Faça login</a></p>
    </div>
    <p id="statusMsg" style="color: #a13e52; margin-top: 12px; display: none;"></p>
  </div>

  <script>
    const API = 'http://localhost:3000/api';
    const statusMsg = document.getElementById('statusMsg');

    function showStatus(text, isError = true) {
      statusMsg.textContent = text;
      statusMsg.style.color = isError ? '#a13e52' : '#1e7b4c';
      statusMsg.style.display = 'block';
    }

    document.getElementById('showRegister').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      statusMsg.style.display = 'none';
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      statusMsg.style.display = 'none';
    });

    async function handleAuth(endpoint, body) {
      const btn = document.querySelector('button[type="button"]') || document.querySelector('#loginBtn') || document.querySelector('#registerBtn');
      btn.disabled = true;
      btn.textContent = 'Carregando...';
      showStatus('Conectando...', false);
      
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000); // 10 segundos de timeout
        
        const res = await fetch(`${API}/auth/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller.signal
        });
        
        clearTimeout(timeout);
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
        
        showStatus('Login bem-sucedido! Redirecionando...', false);
        localStorage.setItem('essencia_token', data.token);
        localStorage.setItem('essencia_user', JSON.stringify(data.user));
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
        
      } catch (err) {
        if (err.name === 'AbortError') {
          showStatus('Tempo esgotado. O servidor não respondeu.');
        } else if (err.message === 'Failed to fetch') {
          showStatus('Não foi possível conectar ao servidor. Verifique se o backend está rodando em http://localhost:3000');
        } else {
          showStatus(err.message);
        }
        console.error('Erro detalhado:', err);
      } finally {
        btn.disabled = false;
        btn.textContent = endpoint === 'login' ? 'Entrar' : 'Cadastrar';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        showStatus('Preencha todos os campos.');
        return;
      }
      handleAuth('login', { email, password });
    });

    document.getElementById('registerBtn').addEventListener('click', () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!name || !email || !password) {
        showStatus('Preencha todos os campos.');
        return;
      }
      if (password.length < 6) {
        showStatus('A senha deve ter pelo menos 6 caracteres.');
        return;
      }
      handleAuth('register', { name, email, password });
    });

    // Enter para enviar
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('regPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('registerBtn').click();
    });

    // Se já estiver logado, redireciona
    if (localStorage.getItem('essencia_token')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
