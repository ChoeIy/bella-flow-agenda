<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Bella Flow • Gestão de Estética</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <h1><i class="fas fa-water"></i> Bella Flow</h1>
        <div class="subhead">Gestão de clientes, agenda e faturamento</div>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="btn-icon-only" title="Alternar tema">
          <i class="fas fa-moon"></i>
        </button>
        <button id="logoutBtn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </header>

    <div class="tabs-nav" id="tabNavigation">
      <button class="tab-btn active" data-tab="clients"><i class="fas fa-users"></i><span>Clientes</span></button>
      <button class="tab-btn" data-tab="appointments"><i class="fas fa-calendar-alt"></i><span>Agenda</span></button>
      <button class="tab-btn" data-tab="services"><i class="fas fa-water"></i><span>Serviços</span></button>
      <button class="tab-btn" data-tab="billing"><i class="fas fa-file-invoice-dollar"></i><span>Faturamento</span></button>
      <button class="tab-btn" data-tab="reports"><i class="fas fa-chart-bar"></i><span>Relatório</span></button>
    </div>

    <main class="main-content" id="mainContent">
      <!-- Skeleton loader inicial -->
      <div class="skeleton-loader" id="skeletonLoader">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalContent"></div>
  </div>

  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-content">
      <i class="fas fa-question-circle"></i>
      <p id="confirmMessage">Tem certeza?</p>
      <div class="confirm-actions">
        <button class="btn-outline" id="confirmCancel">Não</button>
        <button class="btn-primary" id="confirmOk">Sim</button>
      </div>
    </div>
  </div>

  <div class="theme-transition"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
